version: '3.8'

# This file is for local development overrides
services:
  nginx:
    volumes:
      # Override the read-only mount to be read-write for easier development
      - .:/var/www/html

  php:
    # The 'image' name here is a local-only name for the base image.
    image: thai2d3d-php:latest 
    build:
      context: .
      # The 'dockerfile' here points to the new dev-specific Dockerfile.
      dockerfile: Dockerfile.dev
      # This 'args' section tells Docker to build the base image from the main Dockerfile first.
      args:
        BASE_IMAGE: thai2d3d-php:latest
    volumes:
      # Mount the full directory for local development to see changes instantly
      - .:/var/www/html
    environment:
      # This helps Xdebug connect back to the IDE
      # The value is the IP address of your docker host network
      XDEBUG_CONFIG: "client_host=host.docker.internal"

  cron:
    build:
      context: .
      dockerfile: Dockerfile.dev

  redis:
    ports:
      # Expose Redis port only for local debugging if needed
      - "6379:6379"

  # MailHog Service for catching emails in development
  mailhog:
    image: mailhog/mailhog:latest
    container_name: thai2d3d-mailhog
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # Web UI port