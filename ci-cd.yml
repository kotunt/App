name: PHP CI/CD Pipeline
  
# Triggers: Run on push to main/develop or pull request to main/develop
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Permissions needed for posting comments on PRs
permissions:
  contents: read
  pull-requests: write

  # --- CD Job for Staging Environment ---
  # --- CD Job for Production Environment ---
  deploy_production:
    name: Deploy to Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      # Optional: Display the production URL in the deployment status
      url: ${{ secrets.PRODUCTION_URL }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      - name: Build and Push Production Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/thai2d3d-php:${{ github.sha }} # Unique tag for rollback
            ghcr.io/${{ github.repository_owner }}/thai2d3d-php:latest # Latest tag

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e # Exit immediately if a command exits with a non-zero status.
            
            cd /path/to/your/project/on/server

            # 1. Get the ID of the current running image to use for rollback if needed
            # Use a default value if the image doesn't exist yet (first deployment)
            PREVIOUS_IMAGE_ID=$(docker images ghcr.io/${{ github.repository_owner }}/thai2d3d-php:latest -q) || PREVIOUS_IMAGE_ID="none"
            echo "Previous Image ID for rollback: $PREVIOUS_IMAGE_ID"

            # 2. Update environment file with the new image tag
            # Create .env if it doesn't exist, and ensure required variables are present
            echo "IMAGE_TAG=${{ github.sha }}" > .env
            echo "DB_PASS=${{ secrets.DB_PASS }}" >> .env
            echo "MYSQL_ROOT_PASSWORD=${{ secrets.DB_PASS }}" >> .env
            echo "DB_HOST=db" >> .env
            echo "DB_NAME=thai_2d3d_db" >> .env
            echo "DB_USER=root" >> .env
            echo "MYSQL_DATABASE=thai_2d3d_db" >> .env
            echo "MYSQL_USER=root" >> .env
            echo "MYSQL_PASSWORD=${{ secrets.DB_PASS }}" >> .env
            
            docker login ghcr.io -u ${{ github.repository_owner }} -p ${{ secrets.GH_PAT }}

            # 3. Pull the new image
            docker-compose pull php

            # 5. Deploy the new version
            echo "Deploying new version: ${{ github.sha }}"
            docker-compose up -d

            # 6. Health Check
            echo "Waiting for application to start..."
            sleep 20 # Give containers time to initialize
            echo "Performing health check..."
            curl --fail http://localhost:8000/health-check.php || (echo "Health check failed! Rolling back..." && docker-compose down && echo "IMAGE_TAG=latest" > .env && docker-compose up -d && exit 1)

            echo "Deployment successful!"
            
            # 7. Tag the new image as 'latest' and clean up
            docker tag ghcr.io/${{ github.repository_owner }}/thai2d3d-php:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/thai2d3d-php:latest
            docker push ghcr.io/${{ github.repository_owner }}/thai2d3d-php:latest
            docker image prune -af